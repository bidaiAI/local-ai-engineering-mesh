  <text x="408" y="818" fill="#A9B8DE" font-size="22" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">不是单点工具赢，而是系统不再输给单点依赖。</text>

  <text x="84" y="956" fill="#C6D4FF" font-size="18" font-weight="600" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">Different tools, one operating law.</text>
