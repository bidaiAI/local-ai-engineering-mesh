<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#121A33"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="140" x2="1420" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6D7CFF"/>
      <stop offset="0.45" stop-color="#7B5CFF"/>
      <stop offset="1" stop-color="#15C7A8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1600" height="980" fill="url(#bg)"/>
  <rect x="48" y="48" width="1504" height="884" rx="28" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)"/>

  <text x="84" y="110" fill="#EAF0FF" font-size="44" font-weight="700" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">现在已经不只是文档，已经能跑</text>
  <text x="84" y="150" fill="#9FB0D9" font-size="23" font-weight="400" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">最小 runtime 让这套 operating model 变成可执行项目流程。</text>

  <g filter="url(#shadow)">
    <rect x="84" y="214" width="1432" height="264" rx="28" fill="#101935" stroke="rgba(109,124,255,0.45)"/>
  </g>
  <text x="120" y="276" fill="#BED0FF" font-size="20" font-weight="600" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace">Minimal CLI</text>
  <text x="120" y="336" fill="#F5F7FF" font-size="30" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace">python3 -m mesh init /path/to/project</text>
  <text x="120" y="386" fill="#F5F7FF" font-size="30" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace">python3 -m mesh inspect /path/to/project</text>
  <text x="120" y="436" fill="#F5F7FF" font-size="30" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace">python3 -m mesh handoff /path/to/project --task "Add login rate limiting"</text>
  <text x="120" y="486" fill="#F5F7FF" font-size="30" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace">python3 -m mesh verify /path/to/project</text>

  <g filter="url(#shadow)">
    <rect x="84" y="540" width="330" height="210" rx="24" fill="#101935" stroke="rgba(109,124,255,0.45)"/>
    <rect x="430" y="540" width="330" height="210" rx="24" fill="#101935" stroke="rgba(123,92,255,0.45)"/>
    <rect x="776" y="540" width="330" height="210" rx="24" fill="#101935" stroke="rgba(46,176,255,0.42)"/>
    <rect x="1122" y="540" width="394" height="210" rx="24" fill="#101935" stroke="rgba(21,199,168,0.45)"/>
  </g>
  <text x="108" y="592" fill="#F5F7FF" font-size="28" font-weight="700" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">init</text>
  <text x="108" y="636" fill="#C9D4F7" font-size="22" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">创建 memory / state / rules</text>
  <text x="108" y="674" fill="#C9D4F7" font-size="22" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">以及 handoff / runtime metadata</text>

  <text x="454" y="592" fill="#F5F7FF" font-size="28" font-weight="700" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">inspect</text>
  <text x="454" y="636" fill="#C9D4F7" font-size="22" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">查看当前接入程度</text>
  <text x="454" y="674" fill="#C9D4F7" font-size="22" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">知道哪些层已经就位</text>

  <text x="800" y="592" fill="#F5F7FF" font-size="28" font-weight="700" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">handoff</text>
  <text x="800" y="636" fill="#C9D4F7" font-size="22" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">切工具不重讲</text>
  <text x="800" y="674" fill="#C9D4F7" font-size="22" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">把任务状态显式写下来</text>

  <text x="1146" y="592" fill="#F5F7FF" font-size="28" font-weight="700" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">verify</text>
  <text x="1146" y="636" fill="#C9D4F7" font-size="22" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">检查 runtime 是否齐全</text>
  <text x="1146" y="674" fill="#C9D4F7" font-size="22" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">memory / evidence / state 收口</text>

  <text x="84" y="956" fill="#C6D4FF" font-size="18" font-weight="600" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">现在已经能录最短 60 秒 demo 了。</text>
  <text x="1120" y="956" fill="#8FA2D3" font-size="16" font-family="Inter, PingFang SC, Helvetica, Arial, sans-serif">github.com/bidaiAI/local-ai-engineering-mesh</text>

</svg>
